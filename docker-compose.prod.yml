# Docker Compose para PRODUCCION
services:
  database:
    image: mariadb:11.4
    container_name: homa-mariadb-prod
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_AUTO_UPGRADE: 1
    ports:
      - "3311:3306"
    volumes:
      - mysql_data_prod:/var/lib/mysql
    networks:
      - homa-network-prod
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./Homa
      dockerfile: Dockerfile
    image: homa-backend:${APP_VERSION}
    container_name: homa-backend-prod
    restart: always
    depends_on:
      database:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://homa-mariadb-prod:3306/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.mariadb.jdbc.Driver
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 10

      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_SHOW_SQL: false
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MariaDBDialect
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: false

      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      SERVER_SERVLET_CONTEXT_PATH: /

      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER}

      SPRING_MAIL_HOST: ${MAIL_HOST}
      SPRING_MAIL_PORT: ${MAIL_PORT}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    ports:
      - "8080:8080"
    volumes:
      - backend_logs_prod:/app/logs
    networks:
      - homa-network-prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      timeout: 10s
      retries: 5
      interval: 30s
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: homa-frontend:${APP_VERSION}
    container_name: homa-frontend-prod
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_BASE_URL: http://backend:8080
    # IMPORTANTE: evitamos que el entrypoint intente escribir default.conf
    # porque lo montamos en read-only desde nginx/prod.conf
    entrypoint: ["nginx", "-g", "daemon off;"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_logs_prod:/var/log/nginx
    networks:
      - homa-network-prod
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/healthz"]
      timeout: 10s
      retries: 5
      interval: 30s
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data_prod:
    driver: local
  backend_logs_prod:
    driver: local
  frontend_logs_prod:
    driver: local

networks:
  homa-network-prod:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1450
